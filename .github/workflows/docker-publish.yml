name: Build and Push Docker Image

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- CPU image (default, lightweight) ----
      # Tags: latest, X.Y.Z, X.Y  -> what users without a GPU pull.
      # "latest" is enabled on a push to main OR on a version tag release, so a
      # release (which is a tag push, not a branch push) also updates latest.
      - name: Extract metadata (CPU)
        id: meta_cpu
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push CPU image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta_cpu.outputs.tags }}
          labels: ${{ steps.meta_cpu.outputs.labels }}
          cache-from: type=gha,scope=cpu
          cache-to: type=gha,mode=max,scope=cpu

      # ---- GPU image (CUDA + cuDNN, large) ----
      # Tags: latest-gpu, X.Y.Z-gpu, X.Y-gpu  -> opt-in only. Never pulled by
      # default, so non-GPU users don't download the multi-GB CUDA image.
      # flavor.suffix=-gpu adds "-gpu" to the semver tags; "latest-gpu" is set
      # explicitly (suffix= empties the per-tag suffix) under the same condition.
      - name: Extract metadata (GPU)
        id: meta_gpu
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
            suffix=-gpu
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest-gpu,suffix=,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push GPU image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.gpu
          push: true
          tags: ${{ steps.meta_gpu.outputs.tags }}
          labels: ${{ steps.meta_gpu.outputs.labels }}
          cache-from: type=gha,scope=gpu
          cache-to: type=gha,mode=max,scope=gpu
