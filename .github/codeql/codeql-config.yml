name: "CodeQL Config"

paths-ignore:
  - "**/*.md"
  - "docs/**"
  - "**/test_*.py"
  - "**/*_test.py"

# Suppress false positives for validated paths
query-filters:
  - exclude:
      id: py/path-injection
      # Suppress alerts where validate_path() is used
      # validate_path() ensures paths are within ALLOWED_DIRS
