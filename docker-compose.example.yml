# ============================================
# ImageMagick WebGUI - Production Ready
# ============================================
# 
# QUICK START:
# 1. Save this file as: docker-compose.yml
# 2. Run: docker compose up -d
# 3. Open: http://localhost:3000
#
#
# For more options see: docs/INSTALLATION.md
# ============================================

services:
  app:
    # Build ImageFWX; the upstream image does not contain this fork's features.
    build:
      context: .
      dockerfile: Dockerfile
    ports:
    - "3000:3000"  # Frontend - change to "3012:3000" for custom port
    - "8000:8000"  # Backend - change to "8012:8000" for custom port
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Auto-detected! Only change if using reverse proxy with custom routing
      - NEXT_PUBLIC_API_PORT=8000  # ← CHANGE HERE to match backend HOST_PORT above
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:?Set ALLOWED_ORIGINS in .env}
      
      # Database (internal - don't change)
      - DATABASE_URL=postgresql+asyncpg://imagemagick:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/imagemagick
      - REDIS_URL=redis://redis:6379/0
      
      # Security (CHANGE IN PRODUCTION!)
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      
      # Authentication
      - REQUIRE_LOGIN=true
      - ALLOW_REGISTRATION=false
      
      # Image Processing
      - DEFAULT_OUTPUT_FORMAT=webp
      - DEFAULT_QUALITY=85
      - MAX_UPLOAD_SIZE_MB=100
      - IMAGEMAGICK_TIMEOUT=300
      - IMAGEMAGICK_MEMORY_LIMIT=2GB
      
      # History
      - HISTORY_RETENTION_HOURS=24
      # Read-only NAS browser. Set REQUIRE_LOGIN=true and ALLOW_REGISTRATION=false
      # when exposing this service through an external reverse proxy.
      - NAS_BROWSER_ENABLED=false
      - NAS_SOURCE_DIR=/mnt/photos
      - NAS_MAX_IMPORT_FILES=100
      
      # Timezone
      - TZ=UTC
      
      # Google OAuth (optional)
      - GOOGLE_CLIENT_ID=
      - GOOGLE_CLIENT_SECRET=
      
    volumes:
      - uploads:/app/uploads
      - processed:/app/processed
      - temp:/tmp/imagemagick
      # Feiniu example (quote Chinese host paths). Source must stay read-only:
      # - "/vol1/1000/Docker/imagemagick-webui/uploads:/app/uploads"
      # - "/vol1/1000/照片处理结果:/app/processed"
      # - "/vol1/1000/Docker/imagemagick-webui/temp:/tmp/imagemagick"
      # - "/vol1/1000/照片:/mnt/photos:ro"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=imagemagick
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=imagemagick
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imagemagick"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
  processed:
  temp:

networks:
  default:
    driver: bridge
