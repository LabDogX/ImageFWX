services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_PORT: "${NEXT_PUBLIC_API_PORT:-8000}"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_PORT=${NEXT_PUBLIC_API_PORT:-8000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:?Set ALLOWED_ORIGINS in .env}
      - DATABASE_URL=postgresql+asyncpg://imagemagick:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/imagemagick
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - REQUIRE_LOGIN=${REQUIRE_LOGIN:-true}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-false}
      - DEFAULT_OUTPUT_FORMAT=${DEFAULT_OUTPUT_FORMAT:-webp}
      - DEFAULT_QUALITY=${DEFAULT_QUALITY:-85}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-50}
      - IMAGEMAGICK_TIMEOUT=${IMAGEMAGICK_TIMEOUT:-300}
      - IMAGEMAGICK_MEMORY_LIMIT=${IMAGEMAGICK_MEMORY_LIMIT:-2GB}
      - HISTORY_RETENTION_HOURS=${HISTORY_RETENTION_HOURS:-24}
      - CLEANUP_ENABLED=${CLEANUP_ENABLED:-true}
      - CLEANUP_INTERVAL_MINUTES=${CLEANUP_INTERVAL_MINUTES:-60}
      - TEMP_RETENTION_HOURS=${TEMP_RETENTION_HOURS:-24}
      - PROCESSED_RETENTION_HOURS=${PROCESSED_RETENTION_HOURS:-168}
      - REMBG_MODEL=${REMBG_MODEL:-isnet-general-use}
      - ONNX_THREADS=${ONNX_THREADS:-0}
      - NAS_BROWSER_ENABLED=${NAS_BROWSER_ENABLED:-false}
      - NAS_SOURCE_DIR=${NAS_SOURCE_DIR:-/mnt/photos}
      - NAS_MAX_IMPORT_FILES=${NAS_MAX_IMPORT_FILES:-100}
      - TZ=${TZ:-UTC}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    volumes:
      # Keep the defaults as Docker-managed volumes. In .env, each source can
      # instead be an absolute host path for a NAS bind mount.
      - ${UPLOADS_STORAGE:-uploads}:/app/uploads
      - ${PROCESSED_STORAGE:-processed}:/app/processed
      - ${TEMP_STORAGE:-temp}:/tmp/imagemagick
      - ${NAS_SOURCE_STORAGE:-nas_source}:/mnt/photos:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  # GPU variant (v1.1.0). Run with: docker compose --profile gpu up --build
  # Requires NVIDIA Container Toolkit on the host
  # Shares postgres/redis/volumes with the CPU "app" service. Do not run both
  # at once unless you change the ports below (same 3000/8000 by design).
  app-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile.gpu
      args:
        NEXT_PUBLIC_API_PORT: "${NEXT_PUBLIC_API_PORT:-8000}"
    image: imagemagick-webui:latest-gpu
    runtime: nvidia
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_PORT=${NEXT_PUBLIC_API_PORT:-8000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:?Set ALLOWED_ORIGINS in .env}
      - DATABASE_URL=postgresql+asyncpg://imagemagick:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/imagemagick
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - REQUIRE_LOGIN=${REQUIRE_LOGIN:-true}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-false}
      - DEFAULT_OUTPUT_FORMAT=${DEFAULT_OUTPUT_FORMAT:-webp}
      - DEFAULT_QUALITY=${DEFAULT_QUALITY:-85}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-50}
      - IMAGEMAGICK_TIMEOUT=${IMAGEMAGICK_TIMEOUT:-300}
      - IMAGEMAGICK_MEMORY_LIMIT=${IMAGEMAGICK_MEMORY_LIMIT:-2GB}
      - HISTORY_RETENTION_HOURS=${HISTORY_RETENTION_HOURS:-24}
      - CLEANUP_ENABLED=${CLEANUP_ENABLED:-true}
      - CLEANUP_INTERVAL_MINUTES=${CLEANUP_INTERVAL_MINUTES:-60}
      - TEMP_RETENTION_HOURS=${TEMP_RETENTION_HOURS:-24}
      - PROCESSED_RETENTION_HOURS=${PROCESSED_RETENTION_HOURS:-168}
      - REMBG_MODEL=${REMBG_MODEL:-isnet-general-use}
      - ONNX_THREADS=${ONNX_THREADS:-0}
      - NAS_BROWSER_ENABLED=${NAS_BROWSER_ENABLED:-false}
      - NAS_SOURCE_DIR=${NAS_SOURCE_DIR:-/mnt/photos}
      - NAS_MAX_IMPORT_FILES=${NAS_MAX_IMPORT_FILES:-100}
      - TZ=${TZ:-UTC}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GPU_ENABLED=true
      - FORCE_CPU=${FORCE_CPU:-false}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ${UPLOADS_STORAGE:-uploads}:/app/uploads
      - ${PROCESSED_STORAGE:-processed}:/app/processed
      - ${TEMP_STORAGE:-temp}:/tmp/imagemagick
      - ${NAS_SOURCE_STORAGE:-nas_source}:/mnt/photos:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=imagemagick
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=imagemagick
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imagemagick"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
  processed:
  temp:
  nas_source:

networks:
  default:
    driver: bridge
